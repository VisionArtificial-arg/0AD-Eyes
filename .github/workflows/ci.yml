name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Sync locked environment
        run: uv sync --frozen

      # Single entry point: local `just validate` == CI (REQUIREMENTS.md §9.1, X7).
      - name: Validate
        run: just validate
